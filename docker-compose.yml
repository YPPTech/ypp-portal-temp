# WARNING: Default credentials below (ypp/ypp) are for LOCAL DEVELOPMENT only.
# Set POSTGRES_USER, POSTGRES_PASSWORD, and POSTGRES_DB via environment variables
# or a .env file before deploying to any shared or production environment.
services:
  db:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ypp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ypp}
      POSTGRES_DB: ${POSTGRES_DB:-ypp_pathways}
    volumes:
      - ypp_db_data:/var/lib/postgresql/data

volumes:
  ypp_db_data:
